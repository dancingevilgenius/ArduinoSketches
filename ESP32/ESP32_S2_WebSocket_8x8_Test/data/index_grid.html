<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>8x8 Grid WebSocket Viewer</title>

<style>
    body {
        background: #111;
        color: #fff;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        text-align: center;
    }

    /* NEW: Outer wrapper that controls width ONLY on desktop */
    .page-wrapper {
        width: 80vw;              /* mobile: 80% of viewport */
        margin: 0 auto;
    }

    @media (min-width: 700px) {
        .page-wrapper {
            max-width: 300px;     /* desktop: cap width */
        }
    }

    h2 {
        margin-top: 15px;
        font-size: 24px;
    }

    #stats {
        margin-top: 10px;
        font-size: 18px;
        color: #0f0;
    }

    /* GRID */
    .grid-container {
        width: 100%;              /* now inherits wrapper width */
        margin-top: 20px;
    }

    .grid {
        display: grid;
        width: 100%;
        aspect-ratio: 1 / 1;
        grid-template-columns: repeat(8, 1fr);
        grid-template-rows: repeat(8, 1fr);
        gap: 4px;
    }

    .grid-cell {
        background: #333;
        border-radius: 4px;
        transition: background 0.1s linear;
    }

    /* CONTROLS BELOW GRID */
    .controls-wrapper {
        width: 100%;
        margin-top: 20px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        margin-bottom: 20px;
    }

    .control-box {
        background: #222;
        padding: 10px;
        border-radius: 8px;
        text-align: center;
    }

    .control-box label {
        display: block;
        margin-bottom: 6px;
        font-size: 16px;
        font-weight: bold;
    }

    input[type="range"] {
        width: 100%;
    }

    select, button {
        width: 100%;
        padding: 8px;
        font-size: 16px;
        border-radius: 6px;
        border: 1px solid #555;
        background: #333;
        color: #fff;
    }

    button:hover {
        background: #444;
    }
</style>
</head>

<body>

<!-- EVERYTHING NOW LIVES INSIDE THIS WRAPPER -->
<div class="page-wrapper">

    <h2>8×8 Grid WebSocket Display</h2>

    <div id="stats">
        FPS: <span id="fps">--</span> |
        Latency: <span id="lat">--</span> ms |
        Packet: <span id="pkt">--</span> bytes
    </div>

    <!-- GRID -->
    <div class="grid-container">
        <div id="grid" class="grid"></div>
    </div>

    <!-- CONTROLS BELOW GRID -->
    <div class="controls-wrapper">

        <div class="control-box">
            <label>FPS</label>
            <input id="fpsSlider" type="range" min="1" max="60" value="10">
        </div>

        <div class="control-box">
            <label>Brightness</label>
            <input id="briSlider" type="range" min="0" max="100" value="100">
        </div>

        <div class="control-box">
            <label>Animation</label>
            <button id="btnRun">Pause</button>
        </div>

        <div class="control-box">
            <label>Pattern</label>
            <select id="patternSelect">
                <option value="0">Wave</option>
                <option value="1">Diagonal</option>
                <option value="2">Checker</option>
            </select>
        </div>

        <div class="control-box">
            <label>Mode</label>
            <select id="modeSelect">
                <option value="FULL">Full Grid</option>
                <option value="BIT">Bitmask</option>
            </select>
        </div>

    </div>

</div> <!-- end page-wrapper -->

<script>
// Build 8×8 grid
const gridElement = document.getElementById("grid");
const cells = [];
for (let i = 0; i < 64; i++) {
    const div = document.createElement("div");
    div.className = "grid-cell";
    gridElement.appendChild(div);
    cells.push(div);
}

// WebSocket
const socket = new WebSocket("ws://" + location.host + "/ws");
socket.binaryType = "arraybuffer";

let lastPing = 0;

// Ping every 2 seconds
setInterval(() => {
    if (socket.readyState === WebSocket.OPEN) {
        lastPing = performance.now();
        socket.send("PING");
    }
}, 2000);

socket.onmessage = (event) => {
    if (typeof event.data === "string") {
        if (event.data === "PONG") {
            const latency = performance.now() - lastPing;
            document.getElementById("lat").textContent = latency.toFixed(1);
        }
        return;
    }

    const buf = event.data;
    document.getElementById("pkt").textContent = buf.byteLength;

    frameCount++;
    updateFPS();

    if (buf.byteLength === 128) {
        const view = new DataView(buf);
        for (let i = 0; i < 64; i++) {
            updateCellColor(i, view.getUint16(i * 2, true));
        }
    } else if (buf.byteLength === 8) {
        const view = new DataView(buf);
        const bits = view.getBigUint64(0, true);
        for (let i = 0; i < 64; i++) {
            updateCellColor(i, (bits >> BigInt(i)) & 1n ? 1 : 0);
        }
    }
};

// FPS counter
let frameCount = 0;
let lastFPSUpdate = performance.now();

function updateFPS() {
    const now = performance.now();
    const elapsed = now - lastFPSUpdate;

    if (elapsed >= 1000) {
        const fps = Math.round((frameCount / elapsed) * 1000);
        document.getElementById("fps").textContent = fps;
        frameCount = 0;
        lastFPSUpdate = now;
    }
}

function updateCellColor(index, value) {
    cells[index].style.background = value === 0 ? "#333" : "limegreen";
}

function sendCommand(cmd) {
    if (socket.readyState === WebSocket.OPEN) {
        socket.send(cmd);
    }
}

// Controls
const btnRun = document.getElementById("btnRun");
const fpsSlider = document.getElementById("fpsSlider");
const patternSelect = document.getElementById("patternSelect");
const briSlider = document.getElementById("briSlider");
const briValue = document.getElementById("briValue");
const modeSelect = document.getElementById("modeSelect");

let running = true;

btnRun.onclick = () => {
    running = !running;
    btnRun.textContent = running ? "Pause" : "Resume";
    sendCommand("RUN:" + (running ? "1" : "0"));
};

fpsSlider.oninput = () => {
    sendCommand("FPS:" + fpsSlider.value);
};

patternSelect.onchange = () => {
    sendCommand("PAT:" + patternSelect.value);
};

briSlider.oninput = () => {
    sendCommand("BRI:" + (briSlider.value / 100).toFixed(2));
};

modeSelect.onchange = () => {
    sendCommand("MODE:" + modeSelect.value);
};
</script>

</body>
</html>
