<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>8x8 Grid WebSocket Viewer</title>

<style>
    body {
        background: #111;
        color: #fff;
        font-family: Arial, sans-serif;
        text-align: center;
    }

    .row {
        display: flex;
        justify-content: center;
        margin-top: 20px;
    }

    .grid-container {
        margin-top: 20px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(8, 40px);
        grid-template-rows: repeat(8, 40px);
        gap: 4px;
    }

    .grid-cell {
        width: 40px;
        height: 40px;
        background: #333;
        border-radius: 4px;
        transition: background 0.1s linear;
    }

    .controls {
        margin-top: 20px;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
        font-size: 14px;
    }

    .controls > div {
        background: #222;
        padding: 10px 14px;
        border-radius: 6px;
    }

    /* EXTRA 5px vertical spacing */
    .controls label {
        display: block;
        margin-bottom: 5px;
    }

    input[type="range"] {
        width: 120px;
    }

    select, button {
        background: #333;
        color: #fff;
        border: 1px solid #555;
        border-radius: 4px;
        padding: 4px 8px;
    }

    button {
        cursor: pointer;
    }

    button:hover {
        background: #444;
    }

    #stats {
        margin-top: 10px;
        font-size: 18px;
        color: #0f0;
    }
</style>
</head>

<body>

<h2>8×8 Grid WebSocket Display</h2>

<div id="fps" style="color:#0f0; font-size:20px; margin-top:10px;">FPS: --</div>

<div id="stats">
    Latency: <span id="lat">--</span> ms |
    Packet: <span id="pkt">--</span> bytes
</div>

<div class="controls">
    <div>
        <label>Animation</label>
        <button id="btnRun">Pause</button>
    </div>

    <div>
        <label>FPS: <span id="fpsValue">10</span></label>
        <input id="fpsSlider" type="range" min="1" max="60" value="10">
    </div>

    <div>
        <label>Pattern</label>
        <select id="patternSelect">
            <option value="0">Wave</option>
            <option value="1">Diagonal</option>
            <option value="2">Checker</option>
        </select>
    </div>

    <div>
        <label>Brightness: <span id="briValue">1.0</span></label>
        <input id="briSlider" type="range" min="0" max="100" value="100">
    </div>

    <div>
        <label>Mode</label>
        <select id="modeSelect">
            <option value="FULL">Full Grid</option>
            <option value="BIT">Bitmask</option>
        </select>
    </div>
</div>

<div class="row">
    <div id="grid8x8" class="grid-container">
        <div id="grid" class="grid"></div>
    </div>
</div>

<script>
// ------------------------------------------------------------
// Build 8×8 grid dynamically
// ------------------------------------------------------------
const gridElement = document.getElementById("grid");
const cells = [];
for (let i = 0; i < 64; i++) {
    const div = document.createElement("div");
    div.className = "grid-cell";
    gridElement.appendChild(div);
    cells.push(div);
}

// ------------------------------------------------------------
// WebSocket connection
// ------------------------------------------------------------
const socket = new WebSocket("ws://" + location.host + "/ws");
socket.binaryType = "arraybuffer";

let lastPing = 0;

// Send ping every 2 seconds
setInterval(() => {
    if (socket.readyState === WebSocket.OPEN) {
        lastPing = performance.now();
        socket.send("PING");
    }
}, 2000);

socket.onmessage = (event) => {
    // Handle PONG latency response
    if (typeof event.data === "string") {
        if (event.data === "PONG") {
            const latency = performance.now() - lastPing;
            document.getElementById("lat").textContent = latency.toFixed(1);
        }
        return;
    }

    // Binary frame
    const buf = event.data;
    document.getElementById("pkt").textContent = buf.byteLength;

    frameCount++;
    updateFPS();

    if (buf.byteLength === 128) {
        const view = new DataView(buf);
        for (let i = 0; i < 64; i++) {
            updateCellColor(i, view.getUint16(i * 2, true));
        }
    }
    else if (buf.byteLength === 8) {
        const view = new DataView(buf);
        const bits = view.getBigUint64(0, true);
        for (let i = 0; i < 64; i++) {
            updateCellColor(i, (bits >> BigInt(i)) & 1n ? 1 : 0);
        }
    }
};

// ------------------------------------------------------------
// FPS Counter
// ------------------------------------------------------------
let frameCount = 0;
let lastFPSUpdate = performance.now();

function updateFPS() {
    const now = performance.now();
    const elapsed = now - lastFPSUpdate;

    if (elapsed >= 1000) {
        const fps = Math.round((frameCount / elapsed) * 1000);
        document.getElementById("fps").textContent = "FPS: " + fps;
        frameCount = 0;
        lastFPSUpdate = now;
    }
}

// ------------------------------------------------------------
// Update cell color
// ------------------------------------------------------------
function updateCellColor(index, value) {
    cells[index].style.background = value === 0 ? "#333" : "limegreen";
}

// ------------------------------------------------------------
// Command helpers
// ------------------------------------------------------------
function sendCommand(cmd) {
    if (socket.readyState === WebSocket.OPEN) {
        socket.send(cmd);
    }
}

// ------------------------------------------------------------
// UI Controls
// ------------------------------------------------------------
const btnRun = document.getElementById("btnRun");
const fpsSlider = document.getElementById("fpsSlider");
const fpsValue = document.getElementById("fpsValue");
const patternSelect = document.getElementById("patternSelect");
const briSlider = document.getElementById("briSlider");
const briValue = document.getElementById("briValue");
const modeSelect = document.getElementById("modeSelect");

let running = true;

btnRun.onclick = () => {
    running = !running;
    btnRun.textContent = running ? "Pause" : "Resume";
    sendCommand("RUN:" + (running ? "1" : "0"));
};

fpsSlider.oninput = () => {
    const v = parseInt(fpsSlider.value, 10);
    fpsValue.textContent = v;
    sendCommand("FPS:" + v);
};

patternSelect.onchange = () => {
    sendCommand("PAT:" + patternSelect.value);
};

briSlider.oninput = () => {
    const v = (parseInt(briSlider.value, 10) / 100).toFixed(2);
    briValue.textContent = v;
    sendCommand("BRI:" + v);
};

modeSelect.onchange = () => {
    sendCommand("MODE:" + modeSelect.value);
};
</script>

</body>
</html>
