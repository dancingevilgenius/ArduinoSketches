<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Web D-Pad</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    .center-column {
      margin-top: 20px;
    }
    select {
      font-size: 20px;
      padding: 8px;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .status-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
    }
    .status-box {
      width: 140px;
      height: 40px;
      background: #222;
      border: 1px solid #555;
      border-radius: 6px;
      color: #fff;
      font-size: 18px;
      text-align: center;
      line-height: 40px;
    }
    .dpad-container {
      margin-top: 10px;
    }
    .row {
      display: flex;
      justify-content: center;
    }
    .btn {
      width: 80px;
      height: 80px;
      margin: 6px;
      border-radius: 12px;
      border: none;
      background: #333;
      color: #fff;
      font-size: 28px;
      cursor: pointer;
    }
    .btn:active {
      background: #555;
    }
    .bottom-buttons {
      margin-top: 40px;
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
      gap: 20px;
    }
    .action-btn {
      width: 140px;
      height: 60px;
      border-radius: 10px;
      border: none;
      background: #444;
      color: #fff;
      font-size: 24px;
      cursor: pointer;
    }
    .action-btn:active {
      background: #666;
    }
    .grid-container {
      margin-top: 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(8, 40px);
      grid-template-rows: repeat(8, 40px);
      gap: 4px;
    }
    .grid-cell {
      width: 40px;
      height: 40px;
      border-radius: 4px;
      background: #000;
    }
  </style>

  <script>
    // SEND DIRECTION
    function sendDirection(dir) {
      fetch('/controller', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ direction: dir })
      })
      .then(r => r.json())
      .then(data => {
        document.getElementById('hStatus').innerText = data.horiz;
        document.getElementById('vStatus').innerText = data.vert;
        if (data.grid) updateGrid(data.grid);
      });
    }

    // SEND ACTION
    function sendAction(action) {
      fetch('/controller', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: action })
      })
      .then(r => r.json())
      .then(data => { if (data.grid) updateGrid(data.grid); });
    }

    // UPDATE GRID COLORS
    function updateGrid(cells) {
      const grid = document.querySelectorAll('.grid-cell');
      let index = 0;
      for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
          const val = cells[r][c];
          let color = '#000';

          if (val === 0) {
            color = 'rgb(0,0,0)';
          } else if (val >= 1 && val <= 7) {
            const shade = Math.min(255, 30 + val * 30);
            color = `rgb(${shade},0,0)`;
          } else if (val >= 10 && val <= 17) {
            const level = val - 10;
            const shade = Math.min(255, 30 + level * 30);
            color = `rgb(0,${shade},0)`;
          } else {
            color = '#222';
          }

          grid[index].style.background = color;
          index++;
        }
      }
    }

    // PERIODIC GRID POLLING (only in 8x8 mode)
    setInterval(() => {
      const mode = document.getElementById('dropdown').value;
      if (mode !== '8x8') return;

      fetch('/controller', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ requestGrid: true })
      })
      .then(r => r.json())
      .then(data => { if (data.grid) updateGrid(data.grid); });
    }, 500);

    // DROPDOWN TOGGLE
    document.addEventListener('DOMContentLoaded', () => {
      const dropdown = document.getElementById('dropdown');
      const dpad = document.querySelector('.dpad-container');
      const grid = document.getElementById('grid8x8');

      dropdown.addEventListener('change', function() {
        if (this.value === '8x8') {
          dpad.style.display = 'none';
          grid.style.display = 'block';
        } else {
          dpad.style.display = 'block';
          grid.style.display = 'none';
        }
      });
    });
  </script>
</head>
<body>

  <div class="center-column">
    <select id="dropdown">
      <option value="dpad" selected>DPad</option>
      <option value="8x8">8x8</option>
      <option value="tba">TBA</option>
    </select>

    <div class="status-row">
      <div id="hStatus" class="status-box"></div>
      <div id="vStatus" class="status-box"></div>
    </div>
  </div>

  <div class="dpad-container">
    <div class="row">
      <button class="btn" onclick="sendDirection('up')">&#9650;</button>
    </div>
    <div class="row">
      <button class="btn" onclick="sendDirection('left')">&#9664;</button>
      <button class="btn" onclick="sendDirection('center')">OK</button>
      <button class="btn" onclick="sendDirection('right')">&#9654;</button>
    </div>
    <div class="row">
      <button class="btn" onclick="sendDirection('down')">&#9660;</button>
    </div>
  </div>

  <div id="grid8x8" class="grid-container" style="display:none;">
    <div class="row">
      <div class="grid">
        <!-- 64 cells -->
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>

        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>

        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>

        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>

        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>

        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>

        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>

        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
      </div>
    </div>
  </div>

  <div class="bottom-buttons">
    <button class="action-btn" onclick="sendAction('start')">Start</button>
    <button class="action-btn" onclick="sendAction('stop')">Stop</button>
  </div>

</body>
</html>
