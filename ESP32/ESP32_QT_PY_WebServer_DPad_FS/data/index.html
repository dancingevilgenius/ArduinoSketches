<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Web D-Pad</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #111;
        color: #eee;
    }
    .dpad-container {
        display: inline-block;
        margin-top: 40px;
    }
    .row {
        display: flex;
        justify-content: center;
    }
    .btn {
        width: 80px;
        height: 80px;
        margin: 6px;
        border-radius: 12px;
        border: none;
        background: #333;
        color: #fff;
        font-size: 28px;
        cursor: pointer;
        transition: background 0.2s;
    }
    .btn:active {
        background: #555;
    }
</style>

<script>
function sendDirection(dir) {
    fetch("/controller", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ direction: dir })
    });
    return false;
}
</script>

</head>
<body>

<h2>Web D-Pad</h2>

<div class="dpad-container">

    <div class="row">
        <button class="btn" onclick="sendDirection('up')">&#9650;</button>
    </div>

    <div class="row">
        <button class="btn" onclick="sendDirection('left')">&#9664;</button>
        <button class="btn" onclick="sendDirection('center')">OK</button>
        <button class="btn" onclick="sendDirection('right')">&#9654;</button>
    </div>

    <div class="row">
        <button class="btn" onclick="sendDirection('down')">&#9660;</button>
    </div>

</div>

</body>
</html>
