<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Grid Display</title>
<link rel="stylesheet" href="./css/grid.css">
</head>

<body>

<div class="topbar">
    <select id="modeDropdown">
        <option value="dpad">DPad</option>
        <option value="grid" selected>Grid</option>
    </select>
</div>

<div id="statsBar">
    <span>FPS: <span id="fps">0</span></span>
    <span>Latency: <span id="lat">0.0</span> ms</span>
    <span>Packet: <span id="pkt">0</span> bytes</span>
</div>

<div id="gridBlock">
    <div class="grid">
        <!-- 64 real cells -->
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>

        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>

        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>

        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>

        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>

        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>

        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>

        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
    </div>
</div>

<div id="controlsPanel">
    <div class="control-row">
        <label>FPS</label>
        <input id="fpsSlider" type="range" min="1" max="20" value="10">
    </div>

    <div class="control-row">
        <label>Animation</label>
        <button id="btnRun">Pause</button>
    </div>

    <div class="control-row">
        <label>Mode</label>
        <select id="modeSelect">
            <option value="FULL">Full Grid</option>
            <option value="BIT">Bitmask</option>
        </select>
    </div>
</div>

<div id="snackbar-container"></div>

<script src="/js/grid.js"></script>
</body>
</html>
