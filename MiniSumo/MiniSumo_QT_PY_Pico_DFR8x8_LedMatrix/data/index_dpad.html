<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>D-Pad + 8×8 WebSocket Grid</title>

<style>
    body {
        background: #111;
        color: #eee;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        text-align: center;
    }

    .center-column { margin-top: 20px; }

    select {
        font-size: 20px;
        padding: 8px;
        border-radius: 8px;
        margin-bottom: 10px;
    }

    .status-row {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 20px;
    }

    .status-box {
        width: 140px;
        height: 40px;
        background: #222;
        border: 1px solid #555;
        border-radius: 6px;
        color: #fff;
        font-size: 18px;
        text-align: center;
        line-height: 40px;
    }

    .dpad-container { margin-top: 10px; }

    .row { display: flex; justify-content: center; }

    .btn {
        width: 80px;
        height: 80px;
        margin: 6px;
        border-radius: 12px;
        border: none;
        background: #333;
        color: #fff;
        font-size: 28px;
        cursor: pointer;
    }

    .btn:active { background: #555; }

    .bottom-buttons {
        margin-top: 40px;
        margin-bottom: 20px;
        display: flex;
        justify-content: center;
        gap: 20px;
    }

    .action-btn {
        width: 140px;
        height: 60px;
        border-radius: 10px;
        border: none;
        background: #444;
        color: #fff;
        font-size: 24px;
        cursor: pointer;
    }

    .action-btn:active { background: #666; }

    /* 8×8 grid */
    .grid-container { margin-top: 20px; }

    .grid-wrapper {
        display: inline-block;
        width: auto;
        max-width: none;
        margin: 0 auto;
        text-align: center;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(8, 36px);
        grid-template-rows: repeat(8, 36px);
        gap: 4px;
    }

    .grid-cell {
        width: 36px;
        height: 36px;
        border-radius: 4px;
        background: #000;
        transition: background 0.1s linear;
    }

    #stats {
        margin-bottom: 4px;
        font-size: 9px;
        color: #0f0;
        width: 100%;
        box-sizing: border-box;
        text-align: center;
        font-family: monospace;
        letter-spacing: 1px;
    }

    .controls-wrapper {
        width: 100%;
        margin-top: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .control-row {
        display: flex;
        align-items: center;
        background: #222;
        padding: 6px;
        border-radius: 10px;
        width: 100%;
        box-sizing: border-box;
    }

    .control-row label {
        width: 28%;
        font-size: 14px;
        text-align: left;
    }

    .control-row input[type="range"],
    .control-row select,
    .control-row button {
        width: 60%;
        font-size: 13px;
        padding: 6px;
        border-radius: 10px;
        border: 1px solid #555;
        background: #333;
        color: #fff;
    }

    /* -----------------------------
       SNACKBAR SYSTEM
       ----------------------------- */
    #snackbar-container {
        position: fixed;
        bottom: 20px;
        left: 0;
        width: 100%;
        display: flex;
        flex-direction: column-reverse;
        align-items: center;
        pointer-events: none;
        z-index: 9999;
    }

    .snackbar {
        min-width: 90%;
        max-width: 90%;
        padding: 14px 20px;
        margin-top: 10px;
        border-radius: 8px;
        font-size: 18px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        opacity: 0;
        transform: translateY(30px);
        transition: opacity 0.3s ease, transform 0.3s ease;
        pointer-events: auto;
        cursor: pointer;
        color: #fff;
    }

    .snackbar.show {
        opacity: 1;
        transform: translateY(0);
    }

    .snackbar-success { background: #2e7d32; }
    .snackbar-warning { background: #b8860b; }
    .snackbar-error   { background: #8b1a1a; }
</style>

<script>

function runHealthChecks() {
    if (socket && socket.readyState === WebSocket.OPEN) {
        socket.send("HEALTHCHECK");
    }
}

// -----------------------------
// Padding helpers
// -----------------------------
function pad2(n) { return n.toString().padStart(2, ' '); }
function padLatency(n) {
    let parts = n.toFixed(1).split('.');
    return parts[0].padStart(4, ' ') + '.' + parts[1];
}
function pad3(n) { return n.toString().padStart(3, ' '); }

// -----------------------------
// SNACKBAR SYSTEM
// -----------------------------
function showSnackbar(message, type = "success") {
    const container = document.getElementById("snackbar-container");

    const bar = document.createElement("div");
    bar.className = "snackbar";

    if (type === "success") bar.classList.add("snackbar-success");
    if (type === "warning") bar.classList.add("snackbar-warning");
    if (type === "error")   bar.classList.add("snackbar-error");

    bar.textContent = message;

    bar.addEventListener("click", () => {
        bar.classList.remove("show");
        setTimeout(() => bar.remove(), 300);
    });

    container.appendChild(bar);

    void bar.offsetWidth;
    bar.classList.add("show");

    setTimeout(() => {
        bar.classList.remove("show");
        setTimeout(() => bar.remove(), 300);
    }, 6000);
}

// -----------------------------
// D-Pad HTTP control
// -----------------------------
function sendDirection(dir) {
    fetch('/controller', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ direction: dir })
    })
    .then(r => r.json())
    .then(data => {
        document.getElementById('hStatus').innerText = data.horiz || '';
        document.getElementById('vStatus').innerText = data.vert || '';
        if (data.message) showSnackbar(data.message, "success");
    });
}

function sendAction(action) {
    fetch('/controller', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: action })
    })
    .then(r => r.json())
    .then(data => {
        document.getElementById('hStatus').innerText = data.horiz || '';
        document.getElementById('vStatus').innerText = data.vert || '';
        if (data.message) showSnackbar(data.message, "success");
    });
}

// -----------------------------
// WebSocket grid + snackbar handling
// -----------------------------
let socket = null;
let reconnectTimer = null;
let lastPing = 0;
let frameCount = 0;
let lastFPSUpdate = performance.now();
let cells = [];

document.addEventListener('DOMContentLoaded', () => {
    const dropdown = document.getElementById('dropdown');
    const dpad = document.querySelector('.dpad-container');
    const grid8 = document.getElementById('grid8x8');
    const statusRow = document.querySelector('.status-row');
    const bottomButtons = document.querySelector('.bottom-buttons');



    dropdown.addEventListener('change', function() {
		const healthBtn = document.getElementById("healthBtnContainer");

		if (this.value === '8x8') {
			dpad.style.display = 'none';
			grid8.style.display = 'block';
			statusRow.style.display = 'none';
			bottomButtons.style.display = 'none';
			healthBtn.style.display = 'none';
		} else {
			dpad.style.display = 'block';
			grid8.style.display = 'none';
			statusRow.style.display = 'flex';
			bottomButtons.style.display = 'flex';
			healthBtn.style.display = 'block';
		}
	
    });

    cells = Array.from(document.querySelectorAll('.grid-cell'));

    setupControls();
    connectWebSocket();
});

function connectWebSocket() {
    const host = window.location.hostname;
    socket = new WebSocket(`ws://${host}/ws`);
    socket.binaryType = "arraybuffer";

    socket.onopen = () => {
        socket.send("UA:" + navigator.userAgent);
        if (reconnectTimer) clearTimeout(reconnectTimer);
    };

    socket.onclose = () => {
        reconnectTimer = setTimeout(connectWebSocket, 500);
    };

    socket.onerror = () => socket.close();

    socket.onmessage = (event) => {

        // TEXT MESSAGES (snackbars)
        if (typeof event.data === "string") {

            if (event.data === "PONG") {
                const latency = performance.now() - lastPing;
                document.getElementById("lat").textContent = padLatency(latency);
                return;
            }

            if (event.data.startsWith("SNACK:")) {
                const parts = event.data.split(":");
                const type = parts[1];
                const msg  = parts.slice(2).join(":");
                showSnackbar(msg, type);
                return;
            }

            return;
        }

        // BINARY MESSAGES
        const buf = event.data;
        document.getElementById("pkt").textContent = pad3(buf.byteLength);

        frameCount++;
        updateFPS();

        // FULL RGB MODE: 256 bytes
        if (buf.byteLength === 256) {
            const view = new DataView(buf);
            for (let i = 0; i < 64; i++) {
                const rgb = view.getUint32(i * 4, true);
                updateCellColor(i, rgb);
            }
        }

        // BITMASK MODE: 8 bytes
        else if (buf.byteLength === 8) {
            const view = new DataView(buf);
            const bits = view.getBigUint64(0, true);

            for (let i = 0; i < 64; i++) {
                const on = ((bits >> BigInt(i)) & 1n) === 1n;

                if (!on) {
                    updateCellColor(i, 0);
                    continue;
                }

                const row = Math.floor(i / 8);
                let rgb = 0;

                if (row <= 4)       rgb = 0x00FF00;
                else if (row === 6) rgb = 0xFFFF00;
                else if (row === 7) rgb = 0xFF0000;

                updateCellColor(i, rgb);
            }
        }
    };
}

setInterval(() => {
    if (socket && socket.readyState === WebSocket.OPEN) {
        lastPing = performance.now();
        socket.send("PING");
    }
}, 2000);

function updateFPS() {
    const now = performance.now();
    const elapsed = now - lastFPSUpdate;

    if (elapsed >= 1000) {
        const fps = Math.round((frameCount / elapsed) * 1000);
        document.getElementById("fps").textContent = pad2(fps);
        frameCount = 0;
        lastFPSUpdate = now;
    }
}

function updateCellColor(index, rgb) {
    if (rgb === 0) {
        cells[index].style.background = "#222";
        return;
    }

    let r = (rgb >> 16) & 0xFF;
    let g = (rgb >> 8) & 0xFF;
    let b = rgb & 0xFF;

    cells[index].style.background = `rgb(${r},${g},${b})`;
}

function sendCommand(cmd) {
    if (socket && socket.readyState === WebSocket.OPEN) {
        socket.send(cmd);
    }
}

function setupControls() {
    const btnRun = document.getElementById("btnRun");
    const fpsSlider = document.getElementById("fpsSlider");
    const modeSelect = document.getElementById("modeSelect");

    let running = true;

    btnRun.onclick = () => {
        running = !running;
        btnRun.textContent = running ? "Pause" : "Resume";
        sendCommand("RUN:" + (running ? "1" : "0"));
    };

    fpsSlider.oninput = () => sendCommand("FPS:" + fpsSlider.value);
    modeSelect.onchange = () => sendCommand("MODE:" + modeSelect.value);
}
</script>
</head>

<body>

<div class="center-column">
    <select id="dropdown">
        <option value="dpad" selected>DPad</option>
        <option value="8x8">8x8</option>
        <option value="tba">TBA</option>
    </select>

    <div class="status-row">
        <div id="hStatus" class="status-box"></div>
        <div id="vStatus" class="status-box"></div>
    </div>
</div>

<div class="dpad-container">
    <div class="row">
        <button class="btn" onclick="sendDirection('up')">&#9650;</button>
    </div>
    <div class="row">
        <button class="btn" onclick="sendDirection('left')">&#9664;</button>
        <button class="btn" onclick="sendDirection('center')">OK</button>
        <button class="btn" onclick="sendDirection('right')">&#9654;</button>
    </div>
    <div class="row">
        <button class="btn" onclick="sendDirection('down')">&#9660;</button>
    </div>
</div>

<div id="healthBtnContainer" style="margin-top:20px;">
    <button class="action-btn" onclick="runHealthChecks()">Health Check</button>
</div>






<div id="grid8x8" class="grid-container" style="display:none;">
    <div class="grid-wrapper">

        <div id="stats">
            FPS: <span id="fps"> 0</span> |
            Latency: <span id="lat">   0.0</span> ms |
            Packet: <span id="pkt">  0</span> bytes
        </div>


        <div class="row">
            <div class="grid">
                <!-- 64 real grid cells -->
                <!-- row 1 -->
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <!-- row 2 -->
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <!-- row 3 -->
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <!-- row 4 -->
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <!-- row 5 -->
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <!-- row 6 -->
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <!-- row 7 -->
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <!-- row 8 -->
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            </div>
        </div>

        <div class="controls-wrapper">
            <div class="control-row">
                <label>FPS</label>
                <input id="fpsSlider" type="range" min="1" max="20" value="10">
            </div>

            <div class="control-row">
                <label>Animation</label>
                <button id="btnRun">Pause</button>
            </div>

            <div class="control-row">
                <label>Mode</label>
                <select id="modeSelect">
                    <option value="FULL">Full Grid</option>
                    <option value="BIT">Bitmask</option>
                </select>
            </div>
        </div>

    </div>
</div>

<div class="bottom-buttons">
    <button class="action-btn" onclick="sendAction('start')">Start</button>
    <button class="action-btn" onclick="sendAction('stop')">Stop</button>
</div>

<!-- Snackbar container (overlay on all screens) -->
<div id="snackbar-container"></div>

</body>
</html>
